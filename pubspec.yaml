name: our_today
description: "오늘의 우리 — 나를 이해하고(혼자) 서로를 이해하는(커플) 1일 1질문 앱."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

# ──────────────────────────────────────────────────────────────
# MVP 스캐폴드는 외부 의존성을 최소화한다(컴파일 안정성 우선).
# Firebase 패키지는 Phase 2(README 참고)에서 추가한다.
# ──────────────────────────────────────────────────────────────
dependencies:
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1   # 상태관리
  go_router: ^14.2.0         # 라우팅(StatefulShell 바텀네비)
  intl: ^0.19.0              # 날짜 포맷

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
